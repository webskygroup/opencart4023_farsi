name: Notify Version API on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check version API token
        id: credentials
        env:
          VERSION_API_TOKEN: ${{ secrets.VERSION_API_TOKEN }}
        run: |
          if [[ -n "$VERSION_API_TOKEN" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::VERSION_API_TOKEN secret is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify version API
        if: steps.credentials.outputs.configured == 'true'
        env:
          VERSION_API_TOKEN: ${{ secrets.VERSION_API_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF#refs/tags/v}"
          MODULE="${GITHUB_REPOSITORY##*/}"

          curl --fail-with-body -G "https://opencart-ir.com/version/index.php" \
            --data-urlencode "route=tool/websky_version" \
            --data-urlencode "token=${VERSION_API_TOKEN}" \
            --data-urlencode "module=${MODULE}" \
            --data-urlencode "version=${VERSION}"
